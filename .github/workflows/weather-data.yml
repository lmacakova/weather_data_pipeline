name: Fetch Weather Data

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weather-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch full day of weather data
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p data/weather

          FILE_DATE=$(date -u -d "yesterday" +"%Y-%m-%d")
          FILE_PATH="data/weather/${FILE_DATE}_Athenry.json"

          curl -fsSL "https://prodapi.metweb.ie/observations/athenry/yesterday" -o "$FILE_PATH"

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "YOUR_GITHUB_USERNAME"
          git config user.email "YOUR_GITHUB_NO_REPLY_EMAIL"

          git add data/weather/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Add Athenry weather data"
          git push
